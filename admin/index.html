<!DOCTYPE html>
<!-- 관리자 페이지 간 이동은 같은 폴더 상대경로(members.html 등) → Live Server로 /admin/*.html 열어도 동작. 에셋·API는 /styles · /scripts · /img · /api 절대경로 -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>StyleLog 관리자 · 대시보드</title>
    <link rel="icon" href="/img/StyleLog_logo(favicon).png" type="image/png">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/admin.css">
</head>
<body class="admin-app" data-admin-page="dashboard">
    <aside class="admin-sidebar" aria-label="관리자 메뉴">
        <div class="admin-brand">
            <p class="admin-brand-name">StyleLog Admin</p>
            <p class="admin-brand-sub">내부 관리 · DB 요약</p>
            <span class="admin-env-badge">…</span>
        </div>
        <nav class="admin-nav">
            <a href="index.html" data-admin-nav="dashboard"><span class="admin-nav-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3"/><rect width="7" height="7" x="14" y="3"/><rect width="7" height="7" x="14" y="14"/><rect width="7" height="7" x="3" y="14"/></svg></span>대시보드</a>
            <a href="members.html" data-admin-nav="members"><span class="admin-nav-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>회원 현황</a>
            <a href="inquiries.html" data-admin-nav="inquiries"><span class="admin-nav-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>고객 문의</a>
            <a href="feedback.html" data-admin-nav="feedback"><span class="admin-nav-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>고객 피드백</a>
        </nav>
    </aside>
    <div class="admin-main">
        <header class="admin-topbar">
            <div class="admin-topbar-title-wrap">
                <h1 class="admin-page-title">대시보드</h1>
                <p class="admin-topbar-meta">불러오는 중…</p>
            </div>
        </header>
        <main class="admin-content">
            <p class="admin-hint-line" id="admin-dash-banner" hidden></p>

            <section aria-label="요약">
                <div class="admin-grid">
                    <a class="admin-card" href="members.html">
                        <div class="admin-card-label">회원 (목록 최대 1000)</div>
                        <div class="admin-card-value"><span data-admin-metric="members">—</span></div>
                        <div class="admin-card-hint">Auth · 스타일 로그 수(페이지별)</div>
                    </a>
                    <a class="admin-card" href="inquiries.html">
                        <div class="admin-card-label">문의</div>
                        <div class="admin-card-value"><span data-admin-metric="inq-open">—</span> / <span data-admin-metric="inq-total">—</span></div>
                        <div class="admin-card-hint">미답변 / 전체</div>
                    </a>
                    <a class="admin-card" href="feedback.html">
                        <div class="admin-card-label">피드백</div>
                        <div class="admin-card-value"><span data-admin-metric="fb-total">—</span></div>
                        <div class="admin-card-hint">user_feedback 전체 건수</div>
                    </a>
                </div>
            </section>

            <section aria-label="DB 지표" class="admin-dash-db-section">
                <div class="admin-grid">
                    <div class="admin-card admin-card--static">
                        <div class="admin-card-label">스타일 로그 (전체)</div>
                        <div class="admin-card-value"><span data-admin-metric="style-logs">—</span></div>
                        <div class="admin-card-hint">style_logs 행 수</div>
                    </div>
                    <div class="admin-card admin-card--static">
                        <div class="admin-card-label">문의 · 답변완료</div>
                        <div class="admin-card-value"><span data-admin-metric="inq-answered">—</span></div>
                        <div class="admin-card-hint">status = answered</div>
                    </div>
                    <div class="admin-card admin-card--static">
                        <div class="admin-card-label">피드백 유형</div>
                        <div class="admin-card-hint" style="margin:0;line-height:1.6;">
                            아이디어 <strong data-admin-metric="fb-idea">—</strong> ·
                            버그 <strong data-admin-metric="fb-bug">—</strong> ·
                            기타 <strong data-admin-metric="fb-other">—</strong>
                        </div>
                    </div>
                </div>
            </section>

            <section aria-label="최근 문의" class="admin-dash-db-section">
                <div class="admin-panel">
                    <div class="admin-table-wrap">
                        <table class="admin-table admin-table--compact" id="admin-dash-table-inq">
                            <thead>
                                <tr>
                                    <th>상태</th>
                                    <th>제목</th>
                                    <th>작성일</th>
                                    <th>작성자</th>
                                </tr>
                            </thead>
                            <tbody id="admin-dash-inq-tbody">
                                <tr class="admin-placeholder-row"><td colspan="4">데이터 없음</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section aria-label="최근 피드백" class="admin-dash-db-section">
                <div class="admin-panel">
                    <div class="admin-table-wrap">
                        <table class="admin-table admin-table--compact" id="admin-dash-table-fb">
                            <thead>
                                <tr>
                                    <th>유형</th>
                                    <th>제목</th>
                                    <th>작성일</th>
                                    <th>작성자</th>
                                </tr>
                            </thead>
                            <tbody id="admin-dash-fb-tbody">
                                <tr class="admin-placeholder-row"><td colspan="4">데이터 없음</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="/scripts/admin-gate.js" defer></script>
    <script src="/scripts/admin-shell.js" defer></script>
    <script src="/scripts/admin-env-hint.js" defer></script>
    <script src="/scripts/admin-page-utils.js" defer></script>
    <script src="/scripts/admin-page-dashboard.js" defer></script>
</body>
</html>
