<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>StyleLog 관리자 · 고객 문의</title>
    <link rel="icon" href="/img/StyleLog_logo(favicon).png" type="image/png">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/admin.css">
</head>
<body class="admin-app" data-admin-page="inquiries">
    <aside class="admin-sidebar" aria-label="관리자 메뉴">
        <div class="admin-brand">
            <p class="admin-brand-name">StyleLog Admin</p>
            <p class="admin-brand-sub">내부 관리 · DB 요약</p>
            <span class="admin-env-badge">…</span>
        </div>
        <nav class="admin-nav">
            <a href="index.html" data-admin-nav="dashboard"><span class="admin-nav-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3"/><rect width="7" height="7" x="14" y="3"/><rect width="7" height="7" x="14" y="14"/><rect width="7" height="7" x="3" y="14"/></svg></span>대시보드</a>
            <a href="members.html" data-admin-nav="members"><span class="admin-nav-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>회원 현황</a>
            <a href="inquiries.html" data-admin-nav="inquiries"><span class="admin-nav-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>고객 문의</a>
            <a href="feedback.html" data-admin-nav="feedback"><span class="admin-nav-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>고객 피드백</a>
        </nav>
    </aside>
    <div class="admin-main">
        <header class="admin-topbar">
            <div class="admin-topbar-title-wrap">
                <h1 class="admin-page-title">고객 문의</h1>
                <p class="admin-topbar-meta">support_inquiries</p>
            </div>
        </header>
        <main class="admin-content">
            <div class="admin-toolbar">
                <select id="admin-inq-filter" class="admin-input" aria-label="상태 필터" disabled style="min-width:140px;">
                    <option value="all">전체</option>
                    <option value="open">미답변</option>
                    <option value="answered">답변완료</option>
                </select>
                <input type="search" id="admin-inq-search" class="admin-input" placeholder="제목·본문 검색" disabled>
                <div class="admin-toolbar-spacer"></div>
                <button type="button" class="admin-btn admin-btn-primary" id="admin-inq-refresh" disabled>새로고침</button>
            </div>
            <div class="admin-panel">
                <div class="admin-table-wrap">
                    <table class="admin-table admin-table--inquiries">
                        <thead>
                            <tr>
                                <th>상태</th>
                                <th>제목</th>
                                <th>본문 미리보기</th>
                                <th>작성일</th>
                                <th>답변일</th>
                                <th>작성자</th>
                            </tr>
                        </thead>
                        <tbody id="admin-inq-tbody">
                            <tr class="admin-placeholder-row">
                                <td colspan="6">인증 후 목록이 표시됩니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <nav id="admin-inq-pager" class="admin-pagination admin-pagination--footer" aria-label="페이지"></nav>
        </main>
    </div>
    <div id="admin-detail-modal" class="admin-detail-modal" hidden aria-modal="true" role="dialog" aria-labelledby="admin-detail-modal-title">
        <div class="admin-detail-modal__backdrop" data-admin-detail-close></div>
        <div class="admin-detail-modal__panel">
            <header class="admin-detail-modal__header">
                <button type="button" class="admin-detail-modal__nav" id="admin-detail-modal-prev" aria-label="이전">&lt;</button>
                <h2 class="admin-detail-modal__title" id="admin-detail-modal-title">상세</h2>
                <button type="button" class="admin-detail-modal__nav" id="admin-detail-modal-next" aria-label="다음">&gt;</button>
                <button type="button" class="admin-detail-modal__close" data-admin-detail-close aria-label="닫기">&times;</button>
            </header>
            <div class="admin-detail-modal__body" id="admin-detail-modal-body"></div>
        </div>
    </div>
    <script src="/scripts/admin-gate.js" defer></script>
    <script src="/scripts/admin-shell.js" defer></script>
    <script src="/scripts/admin-env-hint.js" defer></script>
    <script src="/scripts/admin-detail-modal.js" defer></script>
    <script src="/scripts/common.js" defer></script>
    <script src="/scripts/admin-page-utils.js?v=inquiries-3" defer></script>
    <script src="/scripts/admin-pagination.js" defer></script>
    <script src="/scripts/admin-page-inquiries.js?v=inquiries-5" defer></script>
</body>
</html>
