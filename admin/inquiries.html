<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>StyleLog 관리자 · 고객 문의</title>
    <link rel="icon" href="/img/StyleLog_logo(favicon).png" type="image/png">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/admin.css">
</head>
<body class="admin-app" data-admin-page="inquiries">
    <aside class="admin-sidebar" aria-label="관리자 메뉴">
        <div class="admin-brand">
            <p class="admin-brand-name">StyleLog Admin</p>
            <p class="admin-brand-sub">내부 관리 (초안 레이아웃)</p>
            <span class="admin-env-badge">…</span>
        </div>
        <nav class="admin-nav">
            <a href="index.html" data-admin-nav="dashboard"><span class="admin-nav-icon" aria-hidden="true">▣</span>대시보드</a>
            <a href="members.html" data-admin-nav="members"><span class="admin-nav-icon" aria-hidden="true">👤</span>회원 현황</a>
            <a href="inquiries.html" data-admin-nav="inquiries"><span class="admin-nav-icon" aria-hidden="true">✉</span>고객 문의</a>
            <a href="feedback.html" data-admin-nav="feedback"><span class="admin-nav-icon" aria-hidden="true">💬</span>고객 피드백</a>
        </nav>
    </aside>
    <div class="admin-main">
        <header class="admin-topbar">
            <h1 class="admin-page-title">고객 문의</h1>
            <p class="admin-topbar-meta">support_inquiries</p>
        </header>
        <main class="admin-content">
            <div class="admin-toolbar">
                <select class="admin-input" aria-label="상태 필터" disabled style="min-width:140px;">
                    <option>전체 (예정)</option>
                </select>
                <input type="search" class="admin-input" placeholder="제목 검색 (예정)" disabled>
                <div class="admin-toolbar-spacer"></div>
                <button type="button" class="admin-btn admin-btn-primary" disabled>새로고침 (예정)</button>
            </div>
            <div class="admin-detail-layout">
                <div class="admin-panel">
                    <div class="admin-table-wrap">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>상태</th>
                                    <th>제목</th>
                                    <th>작성일</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr class="admin-placeholder-row">
                                    <td colspan="3">Edge Function + 관리자 인증 후 목록 표시</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <aside class="admin-panel" style="padding:16px;">
                    <h2 class="admin-section-title" style="margin-top:0;">문의 상세</h2>
                    <p class="admin-card-hint" style="margin:0 0 12px;">본문 · <code style="font-size:11px">admin_reply</code> · 상태 · 메일 알림 (예정)</p>
                </aside>
            </div>
        </main>
    </div>
    <script src="/scripts/admin-shell.js"></script>
</body>
</html>
