<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>StyleLog 관리자 · 고객 문의</title>
    <link rel="icon" href="/img/StyleLog_logo(favicon).png" type="image/png">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/admin.css">
</head>
<body class="admin-app" data-admin-page="inquiries">
    <aside class="admin-sidebar" aria-label="관리자 메뉴">
        <div class="admin-brand">
            <p class="admin-brand-name">StyleLog Admin</p>
            <p class="admin-brand-sub">내부 관리 (초안 레이아웃)</p>
            <span class="admin-env-badge">…</span>
        </div>
        <nav class="admin-nav">
            <a href="index.html" data-admin-nav="dashboard"><span class="admin-nav-icon" aria-hidden="true">▣</span>대시보드</a>
            <a href="members.html" data-admin-nav="members"><span class="admin-nav-icon" aria-hidden="true">👤</span>회원 현황</a>
            <a href="inquiries.html" data-admin-nav="inquiries"><span class="admin-nav-icon" aria-hidden="true">✉</span>고객 문의</a>
            <a href="feedback.html" data-admin-nav="feedback"><span class="admin-nav-icon" aria-hidden="true">💬</span>고객 피드백</a>
        </nav>
    </aside>
    <div class="admin-main">
        <header class="admin-topbar">
            <div class="admin-topbar-title-wrap">
                <h1 class="admin-page-title">고객 문의</h1>
                <p class="admin-topbar-meta">support_inquiries</p>
            </div>
        </header>
        <main class="admin-content">
            <div class="admin-toolbar">
                <select id="admin-inq-filter" class="admin-input" aria-label="상태 필터" disabled style="min-width:140px;">
                    <option value="all">전체</option>
                    <option value="open">미답변</option>
                    <option value="answered">답변완료</option>
                </select>
                <input type="search" id="admin-inq-search" class="admin-input" placeholder="제목·본문·이메일 검색" disabled>
                <div class="admin-toolbar-spacer"></div>
                <button type="button" class="admin-btn admin-btn-primary" id="admin-inq-refresh" disabled>새로고침</button>
            </div>
            <div class="admin-detail-layout">
                <div class="admin-panel">
                    <div class="admin-table-wrap">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>상태</th>
                                    <th>제목</th>
                                    <th>작성일</th>
                                    <th>작성자</th>
                                </tr>
                            </thead>
                            <tbody id="admin-inq-tbody">
                                <tr class="admin-placeholder-row">
                                    <td colspan="4">인증 후 목록이 표시됩니다.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <aside class="admin-panel" id="admin-inq-detail" style="padding:16px;">
                    <h2 class="admin-section-title" style="margin-top:0;">문의 상세</h2>
                    <p class="admin-card-hint" style="margin:0;">목록에서 항목을 선택하세요.</p>
                </aside>
            </div>
        </main>
    </div>
    <script src="/scripts/admin-gate.js" defer></script>
    <script src="/scripts/admin-shell.js" defer></script>
    <script src="/scripts/admin-page-inquiries.js" defer></script>
</body>
</html>
