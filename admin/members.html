<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>StyleLog 관리자 · 회원 현황</title>
    <link rel="icon" href="/img/StyleLog_logo(favicon).png" type="image/png">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="/styles/variables.css">
    <link rel="stylesheet" href="/styles/admin.css">
</head>
<body class="admin-app" data-admin-page="members">
    <aside class="admin-sidebar" aria-label="관리자 메뉴">
        <div class="admin-brand">
            <p class="admin-brand-name">StyleLog Admin</p>
            <p class="admin-brand-sub">내부 관리 · DB 요약</p>
            <span class="admin-env-badge">…</span>
        </div>
        <nav class="admin-nav">
            <a href="index.html" data-admin-nav="dashboard"><span class="admin-nav-icon" aria-hidden="true">▣</span>대시보드</a>
            <a href="members.html" data-admin-nav="members"><span class="admin-nav-icon" aria-hidden="true">👤</span>회원 현황</a>
            <a href="inquiries.html" data-admin-nav="inquiries"><span class="admin-nav-icon" aria-hidden="true">✉</span>고객 문의</a>
            <a href="feedback.html" data-admin-nav="feedback"><span class="admin-nav-icon" aria-hidden="true">💬</span>고객 피드백</a>
        </nav>
    </aside>
    <div class="admin-main">
        <header class="admin-topbar">
            <div class="admin-topbar-title-wrap">
                <h1 class="admin-page-title">회원 현황</h1>
                <p class="admin-topbar-meta">—</p>
            </div>
        </header>
        <main class="admin-content">
            <div class="admin-toolbar">
                <input type="search" id="admin-members-search" class="admin-input" placeholder="이메일·전화·UUID 검색" disabled aria-disabled="true">
                <button type="button" class="admin-btn" id="admin-members-prev" title="이전 페이지">이전</button>
                <button type="button" class="admin-btn" id="admin-members-next" title="다음 페이지">다음</button>
                <div class="admin-toolbar-spacer"></div>
            </div>
            <div class="admin-detail-layout">
                <div class="admin-panel">
                    <div class="admin-table-wrap">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>이메일</th>
                                    <th>이메일 인증</th>
                                    <th>가입일</th>
                                    <th>마지막 로그인</th>
                                    <th>로그 수</th>
                                    <th>ID</th>
                                </tr>
                            </thead>
                            <tbody id="admin-members-tbody">
                                <tr class="admin-placeholder-row">
                                    <td colspan="6">인증 후 목록이 표시됩니다.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <aside class="admin-panel" id="admin-member-detail" style="padding:16px;">
                    <h2 class="admin-section-title" style="margin-top:0;">상세</h2>
                    <p class="admin-card-hint" style="margin:0;">목록에서 행을 선택하세요.</p>
                </aside>
            </div>
        </main>
    </div>
    <script src="/scripts/admin-gate.js" defer></script>
    <script src="/scripts/admin-shell.js" defer></script>
    <script src="/scripts/admin-env-hint.js" defer></script>
    <script src="/scripts/admin-page-members.js" defer></script>
</body>
</html>
